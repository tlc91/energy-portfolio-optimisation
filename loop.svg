<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1F7A4D"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#FAFAF7"/>
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1A1A1A">The Forecasting → PnL Loop</text>
  <text x="500" y="64" text-anchor="middle" font-size="14" fill="#777">Long horizon sets the position · short horizon defends it</text>

  <!-- DATA INPUTS -->
  <rect x="40" y="100" width="200" height="150" rx="10" fill="#EEF3F0" stroke="#1F7A4D" stroke-width="1.5"/>
  <text x="140" y="124" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F7A4D">INPUTS (per asset)</text>
  <text x="140" y="150" text-anchor="middle" font-size="12" fill="#333">Solar generation (HH)</text>
  <text x="140" y="172" text-anchor="middle" font-size="12" fill="#333">Customer demand (HH)</text>
  <text x="140" y="194" text-anchor="middle" font-size="12" fill="#333">Weather / irradiance</text>
  <text x="140" y="216" text-anchor="middle" font-size="12" fill="#333">Calendar / day-type</text>
  <text x="140" y="238" text-anchor="middle" font-size="12" fill="#333">Prices, tariffs</text>

  <!-- PORTFOLIO AGGREGATION -->
  <rect x="300" y="115" width="200" height="120" rx="10" fill="#EEF3F0" stroke="#1F7A4D" stroke-width="1.5"/>
  <text x="400" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F7A4D">AGGREGATE</text>
  <text x="400" y="176" text-anchor="middle" font-size="12" fill="#333">Asset → Portfolio</text>
  <text x="400" y="196" text-anchor="middle" font-size="12" fill="#333">Net position =</text>
  <text x="400" y="214" text-anchor="middle" font-size="12" fill="#333">demand − supply</text>

  <line x1="240" y1="175" x2="298" y2="175" stroke="#1F7A4D" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- TWO FORECASTS -->
  <rect x="580" y="95" width="370" height="80" rx="10" fill="#FFF4E0" stroke="#D98A00" stroke-width="1.5"/>
  <text x="765" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#B36B00">LONG-TERM FORECAST (12–24 mo)</text>
  <text x="765" y="142" text-anchor="middle" font-size="12" fill="#333">Aggregate demand &amp; generation, monthly/seasonal shape</text>
  <text x="765" y="160" text-anchor="middle" font-size="12" fill="#333">+ uncertainty band</text>

  <rect x="580" y="190" width="370" height="80" rx="10" fill="#FFF4E0" stroke="#D98A00" stroke-width="1.5"/>
  <text x="765" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#B36B00">SHORT-TERM FORECAST (1-day → 30-min)</text>
  <text x="765" y="237" text-anchor="middle" font-size="12" fill="#333">Half-hourly net position, probabilistic</text>
  <text x="765" y="255" text-anchor="middle" font-size="12" fill="#333">(quantiles for trading &amp; dispatch)</text>

  <line x1="500" y1="160" x2="578" y2="135" stroke="#1F7A4D" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="500" y1="190" x2="578" y2="225" stroke="#1F7A4D" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- DECISIONS -->
  <rect x="580" y="320" width="175" height="110" rx="10" fill="#E8EEF7" stroke="#2E5A9E" stroke-width="1.5"/>
  <text x="667" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E5A9E">HEDGE</text>
  <text x="667" y="368" text-anchor="middle" font-size="11" fill="#333">Buy forward / PPA</text>
  <text x="667" y="385" text-anchor="middle" font-size="11" fill="#333">Lock price &amp; shape</text>
  <text x="667" y="406" text-anchor="middle" font-size="11" fill="#333">Sets baseline</text>
  <text x="667" y="421" text-anchor="middle" font-size="11" fill="#333">position</text>

  <rect x="775" y="320" width="175" height="110" rx="10" fill="#E8EEF7" stroke="#2E5A9E" stroke-width="1.5"/>
  <text x="862" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E5A9E">TRADE + DISPATCH</text>
  <text x="862" y="368" text-anchor="middle" font-size="11" fill="#333">Day-ahead / intraday</text>
  <text x="862" y="385" text-anchor="middle" font-size="11" fill="#333">Battery charge/</text>
  <text x="862" y="402" text-anchor="middle" font-size="11" fill="#333">discharge (LP/MIP)</text>
  <text x="862" y="421" text-anchor="middle" font-size="11" fill="#333">Defends position</text>

  <line x1="765" y1="175" x2="700" y2="318" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="765" y1="270" x2="845" y2="318" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- SETTLE -->
  <rect x="580" y="480" width="370" height="80" rx="10" fill="#F7E8E8" stroke="#A33" stroke-width="1.5"/>
  <text x="765" y="505" text-anchor="middle" font-size="14" font-weight="bold" fill="#A33">SETTLE (imbalance)</text>
  <text x="765" y="527" text-anchor="middle" font-size="12" fill="#333">Residual gap: actual flow − contracted position</text>
  <text x="765" y="545" text-anchor="middle" font-size="12" fill="#333">priced at HH cash-out price (MHHS)</text>

  <line x1="667" y1="430" x2="710" y2="478" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="862" y1="430" x2="820" y2="478" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- PnL -->
  <rect x="360" y="495" width="180" height="65" rx="10" fill="#1F7A4D"/>
  <text x="450" y="525" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">PnL</text>
  <text x="450" y="546" text-anchor="middle" font-size="11" fill="#DFF0E6">hedge + network + imbalance</text>
  <line x1="578" y1="520" x2="542" y2="525" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- FEEDBACK LOOP -->
  <path d="M360 527 C 200 527, 140 420, 140 258" fill="none" stroke="#1F7A4D" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrG)"/>
  <text x="150" y="400" font-size="11" fill="#1F7A4D" font-style="italic">error attribution</text>
  <text x="150" y="416" font-size="11" fill="#1F7A4D" font-style="italic">→ retrain / improve</text>

  <!-- legend -->
  <rect x="40" y="620" width="16" height="16" fill="#FFF4E0" stroke="#D98A00"/>
  <text x="64" y="633" font-size="12" fill="#333">Forecast (your models)</text>
  <rect x="240" y="620" width="16" height="16" fill="#E8EEF7" stroke="#2E5A9E"/>
  <text x="264" y="633" font-size="12" fill="#333">Decision (optimisation)</text>
  <rect x="430" y="620" width="16" height="16" fill="#F7E8E8" stroke="#A33"/>
  <text x="454" y="633" font-size="12" fill="#333">Market settlement</text>
  <rect x="600" y="620" width="16" height="16" fill="#1F7A4D"/>
  <text x="624" y="633" font-size="12" fill="#333">Outcome</text>

  <text x="500" y="685" text-anchor="middle" font-size="13" fill="#555" font-style="italic">Long horizon → how much to commit (hedge).  Short horizon → how to trade &amp; dispatch around it.</text>
</svg>
